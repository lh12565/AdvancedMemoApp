name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]

    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build web version
      run: npm run build:web

    - name: Create web archive
      run: |
        cd dist
        zip -r ../advanced-memo-app-web.zip .
        cd ..

    - name: Create release notes
      run: |
        echo "# 高级备忘录应用 Release Notes" > release-notes.md
        echo "版本: ${{ github.ref_name }}" >> release-notes.md
        echo "" >> release-notes.md
        echo "## 功能特性" >> release-notes.md
        echo "- 优先级管理（高/中/低）" >> release-notes.md
        echo "- 截止日期和建议处理时间" >> release-notes.md
        echo "- 标签管理和搜索" >> release-notes.md
        echo "- 任务环境追踪和心情记录" >> release-notes.md
        echo "- 数据导出(CSV/JSON)" >> release-notes.md
        echo "- 任务分享功能" >> release-notes.md
        echo "- 完整的统计分析" >> release-notes.md
        echo "- 按月统计数据展示" >> release-notes.md

    - name: Create GitHub Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        release_name: Release ${{ github.ref_name }}
        body_path: release-notes.md
        draft: false
        prerelease: false

    - name: Upload Web Build to Release
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./advanced-memo-app-web.zip
        asset_name: advanced-memo-app-web-${{ github.ref_name }}.zip
        asset_content_type: application/zip

    - name: Notify on completion
      run: echo "Build completed successfully! 📦"
